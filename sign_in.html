<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="sign.css">
    <title>Sign in</title>
</head>
<body>
    <form>
        <h2 class="sign">Sign-in</h2>
        <fieldset>
            <div>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Email" required>
            </div>
            <div>
                <label for="pw">Password</label>
                <input type="password" id="pw" placeholder="Password" required>
            </div>
            <div>
                <button type="reset">Reset</button>
                <button type="submit"><a href="index.html">Submit</a></button>
            </div>
            <div class="account">
                <p><a href="sign_up.html">don't have an account</a></p>
            </div>
        </fieldset>
    </form>
    
    <footer>
        <ul class="links">
            <li>Blog</li>
            <li>Facebook</li>
            <li>Twitter</li>                
            <li>YouTube</li>
            <li>Instagram</li>
            <li>WhatsApp</li>
        </ul>
        <div id="copyright">
            <p>&copy; 2025 Made by Atmika Nayak. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
