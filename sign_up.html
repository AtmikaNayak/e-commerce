<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="sign.css">
    <title>Sign up</title>
</head>
<body>
    
    <form>
        <h2 class="sign">Sign-up</h2>
        <fieldset>
            <div>
                <label for="firstname">First Name</label>
                <input type="text" id="firstname" name="firstname" placeholder="First Name" required>
            </div>
            <div>
                <label for="lastname">Last Name</label>
                <input type="text" id="lastname" name="lastname" placeholder="Last Name" required>
            </div>
            <div>
                <label for="dob">Date Of Birth</label>
                <input type="date" id="dob" name="dob" placeholder="Date Of Birth" required>
            </div>
            <div>
                <label for="ph">Phone Number</label>
                <input type="tel" id="ph" name="ph" placeholder="Phone Number" required>
            </div>
            <div>
                <label for="gender">Gender</label>
                <select type="radio" id="gender" name="gender" placeholder="Gender" required>
                    <option value="male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>
            <div>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Email" required>
            </div>
            <div>
                <label for="pw">Password</label>
                <input type="password" id="pw" placeholder="Password" required>
            </div>
            <div class="submit">
                <button type="reset">Reset</button>
                <button type="submit"><a href="index.html">Submit</a></button>
            </div>
            <div class="account">
                <p><a href="sign_in.html">already have an account</a></p>
            </div>
        </fieldset>
    </form>   
    <footer>
        <ul class="links">
            <li>Blog</li>
            <li>Facebook</li>
            <li>Twitter</li>                
            <li>YouTube</li>
            <li>Instagram</li>
            <li>WhatsApp</li>
        </ul>
        <div id="copyright">
            <p>&copy; 2025 Made by Atmika Nayak. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
